name: Auto Generate 2026 Trending Posts

on:
  schedule:
    # Runs twice a day (at 00:00 and 12:00 UTC)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI anytime

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate 2 AI Financial Posts via Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_posts.py

      - name: Commit and Push Changes to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add posts/posts.json sitemap.xml robots.txt
          git status
          git diff-index --quiet HEAD || (git commit -m "auto: publish 2 new trending finance posts + sitemap update [skip ci]" && git push)
